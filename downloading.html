<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>다운로드 현황 · TorrentBox</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:#0b0e19;color:#e2e8f0;font-family:'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
    .header{background:linear-gradient(180deg,#111827,#0b0e19);padding:20px 16px 14px}
    .header-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-size:18px;font-weight:700;letter-spacing:-.3px}
    .logo-icon{color:#3b82f6}
    .subtitle{font-size:11px;color:#475569;margin-top:2px}
    .content{max-width:600px;margin:0 auto;padding:16px 16px 40px}
    .nav-btn{font-size:12px;font-weight:600;color:#3b82f6;text-decoration:none;padding:6px 10px;border:1px solid rgba(59,130,246,.25);border-radius:8px;white-space:nowrap;transition:all .15s;}
    .nav-btn:hover{background:rgba(59,130,246,.1);}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .section-title{font-size:13px;font-weight:600;color:#64748b;letter-spacing:.5px;text-transform:uppercase;}
    .refresh-btn{font-size:12px;font-weight:600;color:#3b82f6;background:none;border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:5px 10px;cursor:pointer;transition:all .15s;}
    .refresh-btn:hover{background:rgba(59,130,246,.1);}
    .refresh-btn:disabled{opacity:.4;cursor:default;}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    .spinner{display:inline-block;animation:spin .8s linear infinite}
    .loading-state{text-align:center;padding:48px 0;color:#475569;font-size:13px}
    .empty-state{text-align:center;padding:72px 20px}
    .empty-icon{font-size:56px;margin-bottom:16px;opacity:.25;color:#334155}
    .empty-text{font-size:13px;line-height:1.8;color:#334155}
    .error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:12px 14px;font-size:13px;color:#fca5a5;margin-bottom:12px;line-height:1.6;word-break:break-word}
    .task-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:14px 16px;margin-bottom:8px;}
    .task-title{font-size:13px;font-weight:600;color:#e2e8f0;line-height:1.4;word-break:break-word;margin-bottom:10px;}
    .task-meta{display:flex;gap:10px;margin-bottom:8px;font-size:11px;color:#475569;}
    .status-badge{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px;}
    .status-downloading{background:rgba(59,130,246,.15);color:#60a5fa;}
    .status-finished{background:rgba(5,150,105,.15);color:#34d399;}
    .status-waiting{background:rgba(255,255,255,.06);color:#64748b;}
    .progress-row{display:flex;align-items:center;gap:10px;}
    .progress-bar-wrap{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
    .progress-bar{height:100%;border-radius:2px;background:#3b82f6;transition:width .4s ease;}
    .progress-bar.done{background:#059669;}
    .progress-pct{font-size:12px;font-weight:700;color:#64748b;min-width:36px;text-align:right;font-family:'SF Mono',Menlo,Consolas,monospace;}
    .progress-pct.done{color:#34d399;}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div>
        <div class="logo"><span class="logo-icon">⬡</span> Braden TV Downloader</div>
        <div class="subtitle">다운로드 현황</div>
      </div>
      <a href="./" class="nav-btn">← 토렌트 검색</a>
    </div>
  </div>
  <div class="content">
    <div class="section-header">
      <span class="section-title">진행 중인 다운로드</span>
      <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">↻ 새로고침</button>
    </div>
    <div id="taskArea">
      <div class="loading-state"><div class="spinner" style="font-size:28px">↻</div><br>불러오는 중...</div>
    </div>
  </div>

<script>
const WORKER_URL = "https://btdig-proxy.cxzdsa11.workers.dev";

const taskArea = document.getElementById("taskArea");
const refreshBtn = document.getElementById("refreshBtn");

function formatBytes(b) {
  if (b >= 1073741824) return (b / 1073741824).toFixed(1) + " GB";
  if (b >= 1048576) return (b / 1048576).toFixed(1) + " MB";
  if (b >= 1024) return (b / 1024).toFixed(0) + " KB";
  return b + " B";
}
function escHtml(s) {
  return s ? s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : "";
}

async function loadProgress() {
  try {
    const res = await fetch(`${WORKER_URL}/nas/progress`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `NAS 오류 ${res.status}`);
    }
    const { tasks } = await res.json();
    render(tasks);
  } catch (e) {
    taskArea.innerHTML = `<div class="error-box">불러오기 실패: ${escHtml(e.message)}</div>`;
  }
}

function render(tasks) {
  if (!tasks || tasks.length === 0) {
    taskArea.innerHTML = `<div class="empty-state"><div class="empty-icon">⬡</div><div class="empty-text">진행 중인 다운로드가 없습니다</div></div>`;
    return;
  }
  let html = "";
  tasks.forEach(t => {
    const pct = Math.min(100, Math.floor(t.progress));
    const done = pct >= 100 || t.status === "finished";
    const statusLabel = { downloading:"다운로드 중", finished:"완료", waiting:"대기", paused:"일시정지", error:"오류" }[t.status] || t.status || "";
    const statusClass = done ? "status-finished" : t.status === "downloading" ? "status-downloading" : "status-waiting";
    const speed = t.speed_download > 0 ? ` · ${formatBytes(t.speed_download)}/s` : "";
    html += `<div class="task-card">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        <span class="status-badge ${statusClass}">${escHtml(statusLabel)}</span>
        ${t.size > 0 ? `<span>${formatBytes(t.size_downloaded)} / ${formatBytes(t.size)}${speed}</span>` : ""}
      </div>
      <div class="progress-row">
        <div class="progress-bar-wrap"><div class="progress-bar${done?" done":""}" style="width:${pct}%"></div></div>
        <span class="progress-pct${done?" done":""}">${pct}%</span>
      </div>
    </div>`;
  });
  taskArea.innerHTML = html;
}

function manualRefresh() {
  refreshBtn.disabled = true;
  refreshBtn.textContent = "↻ 갱신 중...";
  loadProgress().then(() => {
    refreshBtn.disabled = false;
    refreshBtn.textContent = "↻ 새로고침";
  });
}

loadProgress();
</script>
</body>
</html>
