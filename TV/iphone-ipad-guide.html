<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>아이폰/패드 사용법</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:#0b0e19;color:#e2e8f0;font-family:'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
    .header{background:linear-gradient(180deg,#111827,#0b0e19);padding:20px 16px 14px}
    .header-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
    .logo{font-size:18px;font-weight:700;letter-spacing:-.3px}
    .subtitle{font-size:11px;color:#475569;margin-top:2px}
    .nav-btn{font-size:12px;font-weight:600;color:#3b82f6;text-decoration:none;padding:6px 10px;border:1px solid rgba(59,130,246,.25);border-radius:8px;white-space:nowrap;transition:all .15s}
    .nav-btn:hover{background:rgba(59,130,246,.1)}
    .content{max-width:600px;margin:0 auto;padding:24px 16px 40px}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div>
        <div class="logo">아이폰/패드 사용법</div>
        <div class="subtitle">Braden</div>
      </div>
      <a href="../" class="nav-btn">← 홈</a>
    </div>
  </div>
  <div class="content">
  </div>
</body>
</html>
