<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Braden</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:#0b0e19;color:#e2e8f0;font-family:'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
    .header{background:linear-gradient(180deg,#111827,#0b0e19);padding:20px 16px 14px}
    .header-inner{max-width:600px;margin:0 auto}
    .logo{font-size:18px;font-weight:700;letter-spacing:-.3px}
    .subtitle{font-size:11px;color:#475569;margin-top:2px}
    .content{max-width:600px;margin:0 auto;padding:24px 16px 40px}
    .group{margin-bottom:32px}
    .group-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
    .btn-list{display:flex;flex-direction:column;gap:8px;padding-left:16px}
    .btn-list a{display:block;padding:11px 16px;font-size:15px;font-weight:500;color:#e2e8f0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;text-decoration:none;transition:background .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
    .btn-list a:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14)}
    .btn-list a:active{transform:scale(.98)}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div class="logo">Braden</div>
    </div>
  </div>
  <div class="content">
    <div class="group">
      <div class="group-label">TV</div>
      <div class="btn-list">
        <a href="./TV/torrent">토렌트</a>
        <a href="./TV/iphone-ipad-guide">아이폰/패드 사용법</a>
        <a href="./TV/android-guide">안드로이드 사용법</a>
        <a href="./TV/lg-tv-guide">LG TV 사용법</a>
        <a href="./TV/samsung-tv-guide">삼성 TV 사용법</a>
      </div>
    </div>
    <div class="group">
      <div class="group-label">Temp</div>
    </div>
  </div>
</body>
</html>
